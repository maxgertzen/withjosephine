name: Setup
description: Install pnpm, Node, restore caches, and install dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-node22-pnpm10-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Install studio dependencies
      shell: bash
      # studio/pnpm-lock.yaml is gitignored (separate pnpm project), so
      # --frozen-lockfile would fail in CI. Resolve from package.json.
      run: pnpm --dir studio install --no-frozen-lockfile
