name: e2e-sandbox

on:
  schedule:
    - cron: "0 12 * * 1-5" # weekdays 12:00 UTC
  pull_request:
    branches:
      - release/*
    paths:
      - "src/lib/booking/**"
      - "src/app/api/booking/**"
      - "src/app/api/gifts/**"
      - "src/app/api/listen/**"
      - "src/app/api/stripe/**"
      - "src/app/api/auth/magic-link/**"
      - "src/app/api/internal/gift-claim-dispatch/**"
      - "src/durable-objects/**"
      - "src/lib/durable-objects/**"
      - "tests/e2e/specs/*-roundtrip.spec.ts"
      - "tests/e2e/helpers/**"
      - "tests/e2e/global-setup.ts"
      - "tests/e2e/global-teardown.ts"
      - "playwright.config.ts"
      - ".github/workflows/e2e-sandbox.yml"
  workflow_dispatch:

concurrency:
  group: e2e-sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sandbox:
    name: Playwright sandbox (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: staging
    env:
      E2E_SANDBOX: "1"
      STAGING_URL: https://staging.withjosephine.com
      CF_ACCESS_CLIENT_ID: ${{ secrets.STAGING_CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.STAGING_CF_ACCESS_CLIENT_SECRET }}
      ADMIN_API_KEY: ${{ secrets.STAGING_ADMIN_API_KEY }}
      DO_DISPATCH_SECRET: ${{ secrets.STAGING_DO_DISPATCH_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SANITY_WRITE_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: staging
      CI: "1"

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-setup

      - name: Run sandbox specs against staging
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-test-results
          path: test-results/
          retention-days: 7
