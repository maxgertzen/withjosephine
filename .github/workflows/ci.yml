name: CI

on:
  push:
    branches: [main, feat/staging-separation, feat/operational-completeness, feat/listen-redesign-and-gifting]
  pull_request:
    branches: [main, feat/staging-separation, feat/operational-completeness, feat/listen-redesign-and-gifting]

# Workflow-level env reads ONLY repo-level vars (no environment context here).
# Per-env vars live on each deploy job's env: block, where the job's
# `environment: <name>` brings the env-scoped values into vars context.
env:
  NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
  NEXT_PUBLIC_SANITY_STUDIO_URL: ${{ vars.NEXT_PUBLIC_SANITY_STUDIO_URL }}
  NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
  NEXT_PUBLIC_MIXPANEL_TOKEN: ${{ vars.NEXT_PUBLIC_MIXPANEL_TOKEN }}
  NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
  # Per-env vars also have repo-level defaults (prod values) so lint /
  # typecheck / test / storybook jobs inherit a working build env. The
  # deploy-* jobs override these with environment-scoped values below.
  NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
  NEXT_PUBLIC_UNDER_CONSTRUCTION: ${{ vars.NEXT_PUBLIC_UNDER_CONSTRUCTION }}
  NEXT_PUBLIC_TRACK_NON_PROD: ${{ vars.NEXT_PUBLIC_TRACK_NON_PROD }}
  NEXT_PUBLIC_R2_PUBLIC_HOST: ${{ vars.NEXT_PUBLIC_R2_PUBLIC_HOST }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Assert staging wrangler bindings
        run: pnpm exec tsx scripts/assert-staging-bindings.mts

  # Independent of lint output — runs in parallel with lint-and-typecheck.
  security-audit:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
        --config=./osv-scanner.toml

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test

  storybook:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm storybook:build

  # Deploy the staging Worker (built via @opennextjs/cloudflare).
  # Runs only on pushes to main OR the long-lived `feat/listen-redesign-and-gifting`
  # branch (Phase 1-5 master-plan rollout, see
  # docs/MASTER_PLAN_LISTEN_DASHBOARD_BACKUP_COMPLIANCE.md). PRs do not deploy.
  # All quality gates above (lint, typecheck, test, security-audit, storybook)
  # must pass first. Per-env vars resolve from the GH `staging` environment
  # because of `environment: staging` below.
  deploy-staging:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/listen-redesign-and-gifting')
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, security-audit, storybook]
    environment: staging
    env:
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_UNDER_CONSTRUCTION: ${{ vars.NEXT_PUBLIC_UNDER_CONSTRUCTION }}
      NEXT_PUBLIC_TRACK_NON_PROD: ${{ vars.NEXT_PUBLIC_TRACK_NON_PROD }}
      NEXT_PUBLIC_R2_PUBLIC_HOST: ${{ vars.NEXT_PUBLIC_R2_PUBLIC_HOST }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Worker bundle (staging)
        run: pnpm cf:build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Deploy Worker to Cloudflare (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          # Worker runtime secrets are configured via `wrangler secret put --env staging`,
          # not pushed from here. See docs/PHASE10_CLOUDFLARE_SETUP.md.

  # Deploy the production Worker. Runs only after staging deploys cleanly.
  # Top-level wrangler config (no --env flag) targets the prod worker
  # `withjosephine`. Required-reviewer gate on the production environment
  # is added in PR-S4 — until then this job auto-promotes once staging is green.
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    env:
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_UNDER_CONSTRUCTION: ${{ vars.NEXT_PUBLIC_UNDER_CONSTRUCTION }}
      NEXT_PUBLIC_TRACK_NON_PROD: ${{ vars.NEXT_PUBLIC_TRACK_NON_PROD }}
      NEXT_PUBLIC_R2_PUBLIC_HOST: ${{ vars.NEXT_PUBLIC_R2_PUBLIC_HOST }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Worker bundle (production)
        run: pnpm cf:build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      - name: Deploy Worker to Cloudflare (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
