name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # NEXT_PUBLIC_* vars are inlined into the client/SSR bundle at build time —
  # missing here means missing in production. Add new vars to BOTH this block
  # AND `gh variable set` (or the GH UI) before relying on them.
  NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
  NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
  NEXT_PUBLIC_SANITY_STUDIO_URL: ${{ vars.NEXT_PUBLIC_SANITY_STUDIO_URL }}
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
  NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
  NEXT_PUBLIC_UNDER_CONSTRUCTION: ${{ vars.NEXT_PUBLIC_UNDER_CONSTRUCTION }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: pnpm typecheck

  # Independent of lint output — runs in parallel with lint-and-typecheck.
  security-audit:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
        --config=./osv-scanner.toml

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm test

  storybook:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm storybook:build

  # Deploy the Cloudflare Worker (built via @opennextjs/cloudflare).
  # Runs only on pushes to main — PRs do not deploy. All quality gates
  # above (lint, typecheck, test, security-audit) must pass first.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, security-audit, storybook]
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build Worker bundle
        run: pnpm cf:build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # Worker runtime secrets (read by the deployed Worker, not the build)
          # are configured via Cloudflare dashboard, not pushed from here.
          # See docs/PHASE10_CLOUDFLARE_SETUP.md.
