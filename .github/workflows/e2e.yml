name: e2e

on:
  pull_request:
    branches:
      - main
      - release/v1.0.0
    paths:
      - "src/components/IntakeForm/**"
      - "src/components/GiftForm/**"
      - "src/app/book/**"
      - "src/app/gift/**"
      - "src/app/thank-you/**"
      - "src/app/api/booking/**"
      - "src/lib/booking/**"
      - "src/lib/sanity/**"
      - "src/lib/compliance/**"
      - "studio/schemas/bookingForm.ts"
      - "studio/schemas/bookingGiftForm.ts"
      - "studio/schemas/formField.ts"
      - "studio/schemas/formSection.ts"
      - "src/__fixtures__/sanity/e2e/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "scripts/generate-e2e-fixtures.ts"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      STRIPE_SECRET_KEY: sk_test_e2e_dummy
      STRIPE_WEBHOOK_SECRET: whsec_e2e_dummy
      SANITY_WRITE_TOKEN: ""
      SANITY_READ_TOKEN: ""
      NEXT_PUBLIC_SANITY_PROJECT_ID: e8jsb14m
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      NEXT_PUBLIC_BOOKING_TURNSTILE_BYPASS: "1"
      BOOKING_TURNSTILE_BYPASS: "1"
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      LISTEN_TOKEN_SECRET: e2e_listen_token_secret_dummy
      ADMIN_API_KEY: e2e_admin_api_key_dummy
      E2E: "1"
      CI: "1"

    steps:
      - name: Check D-4 grandfathering
        id: grandfather
        run: |
          # PRs sourced from release/v1.0.0 → main are grandfathered out of the
          # required-check gate per PRD D-4 (predate Phase 0 merge). The workflow
          # still runs (signal value); branch-protection rules in repo admin
          # decide whether failures block merge.
          if [ "${{ github.event.pull_request.head.ref }}" = "release/v1.0.0" ]; then
            echo "::notice::This PR is grandfathered out of the e2e required-check gate per PRD D-4 (release/v1.0.0 → main carries pre-Phase-0 commits)."
          fi

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (browsers cached)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright
        run: pnpm exec playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
